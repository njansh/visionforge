services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: visionforge-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  db:
    image: postgres:15
    container_name: visionforge-db
    environment:
      - POSTGRES_DB=visionforgedb
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"